<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ご自愛♡ビンゴ</title>
    <style>
        body { font-family: sans-serif; background: #F5E6D3; padding: 20px; display: flex; flex-direction: column; align-items: center; }
        .container { max-width: 450px; width: 100%; background: #FFF; border-radius: 20px; padding: 20px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); }
        .header { text-align: center; margin-bottom: 20px; }
        .title { color: #B8434E; font-size: 24px; font-weight: bold; }
        .subtitle { color: #8C6D67; font-size: 14px; }
        .stats { display: flex; justify-content: space-around; background: #FDF8F5; padding: 10px; border-radius: 10px; margin-bottom: 20px; }
        .stat-val { font-size: 20px; font-weight: bold; color: #B8434E; display: block; }
        .bingo-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; margin-bottom: 20px; }
        .cell { 
            height: 100px; background: #FFF; border: 2px solid #F2D5D8; border-radius: 10px;
            display: flex; align-items: center; justify-content: center; text-align: center;
            font-size: 11px; cursor: pointer; position: relative; padding: 5px; overflow: hidden;
        }
        .cell.selected { background: #FCEFF0; border-color: #B8434E; color: #B8434E; font-weight: bold; }
        .heart { display: none; position: absolute; font-size: 50px; color: #B8434E; opacity: 0.5; top: 50%; left: 50%; transform: translate(-50%, -50%); pointer-events: none; }
        .selected .heart { display: block; }
        .free .heart { display: block; opacity: 0.2; }
        textarea { width: 100%; height: 100%; border: none; background: transparent; text-align: center; font-size: 10px; color: #B8434E; outline: none; resize: none; }
        .btns { display: flex; gap: 10px; margin-bottom: 20px; }
        button { flex: 1; padding: 12px; border: none; border-radius: 10px; font-weight: bold; cursor: pointer; }
        .btn-r { background: #F2D5D8; color: #B8434E; }
        .btn-s { background: #B8434E; color: #FFF; }
        #modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.7); align-items: center; justify-content: center; z-index: 99; }
        .modal-c { background: #FFF; padding: 30px; border-radius: 20px; text-align: center; max-width: 350px; width: 90%; }
        .celebration { position: fixed; pointer-events: none; z-index: 999; animation: fall 3s linear forwards; color: #B8434E; }
        @keyframes fall { to { transform: translateY(100vh) rotate(360deg); opacity: 0; } }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1 class="title">ご自愛♡ビンゴ</h1>
            <p class="subtitle">毎日ちょこっと、自分にハナマルを</p>
        </div>
        <div class="stats">
            <div><span class="stat-val" id="cnt">0</span>ハナマル</div>
            <div><span class="stat-val" id="bgo">0</span>ビンゴ</div>
        </div>
        <div class="bingo-grid">
            <div class="cell" id="c0" onclick="tgl(0)">一度、呼吸に意識を向けた<div class="heart">❤</div></div>
            <div class="cell" id="c1" onclick="tgl(1)">ホッとする瞬間を感じた<div class="heart">❤</div></div>
            <div class="cell" id="c2" onclick="tgl(2)">
                <textarea id="i0" placeholder="誰の目も気にせず、&#13;&#10;やってみたいご自愛を&#13;&#10;入力してね" onclick="event.stopPropagation()"></textarea>
                <div class="heart">❤</div>
            </div>
            <div class="cell" id="c3" onclick="tgl(3)">どんな自分もOKだと思えた瞬間があった<div class="heart">❤</div></div>
            <div class="cell free selected" id="c4">FREE<div class="heart">❤</div></div>
            <div class="cell" id="c5" onclick="tgl(5)">何もしない時間をゆるした<div class="heart">❤</div></div>
            <div class="cell" id="c6" onclick="tgl(6)">
                <textarea id="i1" placeholder="今のあなたが心地いいと&#13;&#10;感じるご自愛を&#13;&#10;入力してね" onclick="event.stopPropagation()"></textarea>
                <div class="heart">❤</div>
            </div>
            <div class="cell" id="c7" onclick="tgl(7)">“心地いい”を優先した<div class="heart">❤</div></div>
            <div class="cell" id="c8" onclick="tgl(8)">外側から少し離れて、自分に戻った<div class="heart">❤</div></div>
        </div>
        <div class="btns">
            <button class="btn-r" onclick="if(confirm('リセットしますか？'))location.reload()">リセット</button>
            <button class="btn-s" onclick="shr()">今の気持ちをシェア</button>
        </div>
    </div>
    <div id="modal" onclick="this.style.display='none'">
        <div class="modal-c" onclick="event.stopPropagation()">
            <h2 id="mT" style="color:#B8434E; margin-bottom:15px;"></h2>
            <p id="mX" style="line-height:1.6; margin-bottom:20px;"></p>
            <button class="btn-s" onclick="document.getElementById('modal').style.display='none'">閉じる</button>
        </div>
    </div>
    <script>
        var sel = [false, false, false, false, true, false, false, false, false];
        function tgl(n) {
            if (n === 4) return;
            if (n === 2 || n === 6) {
                var txt = document.getElementById('i' + (n==2?0:1)).value;
                if (!txt && !sel[n]) { alert("まずはご自愛を入力してね"); return; }
            }
            sel[n] = !sel[n];
            var cell = document.getElementById('c' + n);
            if (sel[n]) cell.classList.add('selected');
            else cell.classList.remove('selected');
            var c = 0; for(var i=0; i<9; i++) if(sel[i]) c++;
            document.getElementById('cnt').innerText = c - 1;
            chk();
        }
        function chk() {
            var b = 0;
            var ls = [[0,1,2],[3,4,5],[6,7,8],[0,3,6],[1,4,7],[2,5,8],[0,4,8],[2,4,6]];
            for(var i=0; i<ls.length; i++) {
                var l = ls[i]; if(sel[l[0]] && sel[l[1]] && sel[l[2]]) b++;
            }
            var pb = parseInt(document.getElementById('bgo').innerText);
            document.getElementById('bgo').innerText = b;
            if (b > pb) {
                var t = document.getElementById('mT'), x = document.getElementById('mX');
                if (b === 8) {
                    t.innerText = "✨ おかえり、わたし ✨";
                    x.innerHTML = "何度揺れても、また戻ってこれる。  
その感覚が、もうちゃんとここにある。  
これからも、そのままで大丈夫。  
  
<b>あなたがあなたで在れますように☺</b>";
                    for(var i=0; i<30; i++) {
                        var h = document.createElement('div'); h.className = 'celebration'; h.innerHTML = '❤';
                        h.style.left = Math.random()*100+'vw'; h.style.top = '-50px'; h.style.fontSize = (Math.random()*30+20)+'px';
                        document.body.appendChild(h);
                    }
                } else if (b >= 3) { t.innerText = "✨ そのままでも、ちゃんと進んでる ✨"; x.innerHTML = "何かを変えなくても、  
こうやって戻ってこれてることがすごい。  
あなたのペースでいいんだよ。"; }
                else if (b === 2) { t.innerText = "✨ 少し力、抜けてきたかも ✨"; x.innerHTML = "ちゃんと頑張ってたね。  
ちゃんと気づけてるね。  
そのままで、ちゃんと大丈夫だよ。"; }
                else { t.innerText = "✨ ちゃんと戻ってきてるよ ✨"; x.innerHTML = "気づいた時点で、もう十分。  
何も変わってなくても大丈夫。  
今ここにいる自分でOKだよ。"; }
                document.getElementById('modal').style.display = 'flex';
            }
        }
        function shr() {
            var n = document.getElementById('cnt').innerText;
            var s = "今日は" + n + "回、自分にハナマルをあげられました。毎日ちょこっと、自分に戻る時間を。 #ご自愛ビンゴ";
            if (navigator.share) navigator.share({title:'ご自愛ビンゴ', text:s, url:location.href});
            else alert("結果：" + s);
        }
    </script>
</body>
</html>
